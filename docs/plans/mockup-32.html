<!DOCTYPE html>
<html>
<head>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&display=swap');

  body {
    font-family: 'Oswald', sans-serif;
    padding: 24px;
    background: radial-gradient(circle at center, #233c2d 0%, #101c15 100%);
    color: #fff;
    min-height: 100vh;
    margin: 0;
  }
  h2 { text-align: center; margin-bottom: 4px; letter-spacing: 1px; color: #fff; text-transform: uppercase; font-size: 22px; }
  .subtitle { text-align: center; color: #aaa; margin-bottom: 32px; font-size: 13px; font-family: sans-serif; }
  
  .columns-container { display: flex; gap: 40px; justify-content: center; align-items: flex-start; }
  .column { display: flex; flex-direction: column; align-items: center; width: 300px; }
  .column-label { font-size: 16px; font-weight: bold; color: #eee; margin-bottom: 12px; letter-spacing: 1px; }
  
  /* Generic hierarchical containers */
  .draw-section { display: flex; flex-direction: column; width: 100%; }
  
  /* For 32, we can relax the gaps a tiny bit to make it look spacious and premium */
  .draw-section.level-2 { 
    gap: 12px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 8px; padding: 12px; 
  }
  .draw-section.level-3 { 
    gap: 8px; background: rgba(0, 0, 0, 0.2); border-radius: 6px; padding: 8px; 
  }
  .draw-section.level-4 { 
    background: linear-gradient(to bottom, #ffffff 0%, #e2e8f0 100%);
    border-radius: 6px; overflow: hidden; box-shadow: 0 3px 6px rgba(0,0,0,0.4); border: 1px solid #94a3b8;
  }
  
  .player {
    display: flex; align-items: center;
    height: 28px; font-size: 13px; color: #0f172a; background: transparent;
  }
  .player + .player { border-top: 1px solid #cbd5e1; }
  
  .pos {
    order: 1; background: linear-gradient(to bottom, #fde047, #eab308); font-weight: 700;
    min-width: 28px; height: 100%; display: flex; align-items: center; justify-content: center;
    border-right: 1px solid #94a3b8; color: #000; font-size: 13px;
  }
  .country {
    order: 2; font-size: 9px; font-weight: 700; background: #064e3b; color: #fff;
    padding: 2px 4px; border-radius: 2px; letter-spacing: 0.5px; margin-left: 6px; font-family: sans-serif;
  }
  .name {
    order: 3; flex: 1; font-weight: 700; padding-left: 8px; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
</style>
</head>
<body>

<h2>32-Position Draw — 2 Column View</h2>
<p class="subtitle">Each column holds 16 players to provide a spacious, centered layout</p>

<div class="columns-container" id="draw-container">
  <!-- Columns generated by JS -->
</div>

<script>
  function createPlayer(pos) {
    return `<div class="player">
      <span class="pos">${pos}</span>
      <span class="country">CHN</span>
      <span class="name">Player ${pos}</span>
    </div>`;
  }

  function createGroup(startPos) {
    let html = '<div class="draw-section level-4">';
    for(let i=0; i<4; i++) {
      html += createPlayer(startPos + i);
    }
    html += '</div>';
    return html;
  }

  function createEighth(startPos) { // 8 players
    let html = '<div class="draw-section level-3">';
    html += createGroup(startPos);
    html += createGroup(startPos + 4);
    html += '</div>';
    return html;
  }

  function createQuarter(startPos) { // 16 players
    let html = '<div class="draw-section level-2">';
    html += createEighth(startPos);
    html += createEighth(startPos + 8);
    html += '</div>';
    return html;
  }

  const container = document.getElementById('draw-container');
  let html = '';
  // Top Half (1-16)
  html += `<div class="column">
    <div class="column-label">TOP HALF</div>
    ${createQuarter(1)}
  </div>`;
  // Bottom Half (17-32)
  html += `<div class="column">
    <div class="column-label">BOTTOM HALF</div>
    ${createQuarter(17)}
  </div>`;
  
  container.innerHTML = html;
</script>

</body>
</html>
